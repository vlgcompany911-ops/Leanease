<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnEase - Professional CBT Portal</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <style>
        :root {
            --primary: #2563eb; --secondary: #64748b; --success: #22c55e;
            --bg-light: #f8fafc; --text-dark: #1e293b; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-light); margin: 0; color: var(--text-dark); overflow-x: hidden; }
        .hidden { display: none !important; }
        .btn { padding: 0.8rem 1.5rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: all 0.2s; display: inline-block; text-align: center; }
        .primary { background: var(--primary); color: white; }
        .secondary { background: var(--secondary); color: white; }
        .overlay { position: fixed; inset: 0; background: var(--bg-light); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; width: 100%; max-width: 400px; }
        .brand-logo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary); margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .cbt-container { display: flex; flex-direction: column; height: 100vh; }
        header { background: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; }
        .timer-box { background: #fee2e2; color: #ef4444; padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: bold; }
        main { display: grid; grid-template-columns: 280px 1fr; flex-grow: 1; overflow: hidden; }
        .q-sidebar { background: white; border-right: 1px solid #e2e8f0; padding: 1.5rem; overflow-y: auto; }
        .q-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 1rem; }
        .q-num { height: 45px; border: 1px solid #cbd5e1; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 6px; font-weight: 600; }
        .q-num.active { background: var(--primary); color: white; }
        .q-num.answered { background: var(--success); color: white; }
        .q-display { padding: 3rem 5%; overflow-y: auto; max-width: 1000px; margin: 0 auto; width: 100%; }
        .options-container { display: flex; flex-direction: column; gap: 1rem; margin: 2rem 0; }
        .option-btn { padding: 1.2rem; text-align: left; background: white; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; }
        .option-btn.selected { border-color: var(--primary); background: #eff6ff; }
        .controls { display: flex; justify-content: space-between; margin-top: 3rem; border-top: 1px solid #e2e8f0; padding-top: 2rem; }
        .admin-panel { position: fixed; inset: 0; background: rgba(15,23,42,0.95); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .admin-card { background: white; padding: 2rem; border-radius: 15px; width: 100%; max-width: 600px; }
        textarea { width: 100%; height: 250px; margin: 10px 0; font-family: monospace; padding: 10px; border: 1px solid #ddd; }
        .score-circle { width: 140px; height: 140px; border: 10px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 2rem auto; font-size: 2.5rem; font-weight: 800; color: var(--primary); }
        @media (max-width: 768px) { main { grid-template-columns: 1fr; } .q-sidebar { display: none; } }
    </style>
</head>
<body>

    <div id="loginPage" class="overlay">
        <div class="card">
            <img src="logo.jpg" alt="LearnEase Logo" class="brand-logo" onerror="this.src='https://via.placeholder.com/100?text=Owl'">
            <h1 style="color:var(--primary); margin:0; font-size: 2.2rem;">LearnEase</h1>
            <p style="color:var(--secondary); margin-bottom: 20px;">Secure Examination Portal</p>
            <input type="text" id="studentName" placeholder="Full Name">
            <input type="text" id="studentID" placeholder="Student ID">
            <button class="btn primary" style="width:100%; margin-top: 10px;" onclick="startExam()">Launch Exam</button>
            </div>
    </div>

    <div id="examPage" class="cbt-container hidden">
        <header>
            <div><strong style="color:var(--primary)">LearnEase</strong> | <span id="displaySubject">General Assessment</span></div>
            <div id="timer" class="timer-box">10:00</div>
        </header>
        <main>
            <aside class="q-sidebar">
                <h3 style="margin-top:0">Navigator</h3>
                <div class="q-grid" id="qGrid"></div>
            </aside>
            <section class="q-display">
                <div id="qProgress" style="font-weight: bold; color: var(--secondary);">Question 1 of 0</div>
                <h2 id="qText">Loading...</h2>
                <div id="options" class="options-container"></div>
                <div class="controls">
                    <button class="btn secondary" onclick="prevQ()">Previous</button>
                    <button class="btn primary" onclick="nextQ()" id="nextBtn">Next Question</button>
                </div>
            </section>
        </main>
    </div>

    <div id="resultPage" class="overlay hidden">
        <div class="card">
            <h2>Exam Summary</h2>
            <div class="score-circle" id="scoreCircle">0%</div>
            <p id="resultMsg"></p>
            <button class="btn secondary" onclick="downloadReport()">Save Report</button>
            <button class="btn primary" onclick="location.reload()">Exit</button>
        </div>
    </div>

    <div id="adminPage" class="admin-panel hidden">
        <div class="admin-card">
            <h2>Admin Control Center</h2>
            <textarea id="adminJSON"></textarea>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn primary" onclick="saveAdmin()">Apply Changes</button>
                <button class="btn secondary" onclick="closeAdmin()">Discard</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [
            { q: "What is 2 + 2?", options: ["3", "4", "5", "6"], correct: 1 }
        ];

        let currentIndex = 0;
        let userAnswers = new Array(quizData.length).fill(null);
        let student = { name: "", id: "" };
        let timeLeft = 600;
        let timerInterval;

        function startExam() {
            const name = document.getElementById('studentName').value;
            const id = document.getElementById('studentID').value;
            if(!name || !id) return alert("Enter Name and ID");
            student = { name, id };
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('examPage').classList.remove('hidden');
            initExam();
        }

        function initExam() { renderGrid(); renderQuestion(); startTimer(); }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if(timeLeft <= 0) { clearInterval(timerInterval); finishExam(); }
            }, 1000);
        }

        function renderGrid() {
            const grid = document.getElementById('qGrid');
            grid.innerHTML = '';
            quizData.forEach((_, i) => {
                const div = document.createElement('div');
                div.className = `q-num ${userAnswers[i] !== null ? 'answered' : ''} ${i === currentIndex ? 'active' : ''}`;
                div.innerText = i + 1;
                div.onclick = () => { currentIndex = i; renderQuestion(); };
                grid.appendChild(div);
            });
        }

        function renderQuestion() {
            const data = quizData[currentIndex];
            document.getElementById('qText').innerText = data.q;
            document.getElementById('qProgress').innerText = `Question ${currentIndex + 1} of ${quizData.length}`;
            const optCont = document.getElementById('options');
            optCont.innerHTML = '';
            data.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = `option-btn ${userAnswers[currentIndex] === i ? 'selected' : ''}`;
                btn.innerText = opt;
                btn.onclick = () => { userAnswers[currentIndex] = i; renderQuestion(); renderGrid(); };
                optCont.appendChild(btn);
            });
            document.getElementById('nextBtn').innerText = currentIndex === quizData.length - 1 ? "Submit" : "Next";
        }

        function nextQ() {
            if(currentIndex < quizData.length - 1) { currentIndex++; renderQuestion(); }
            else { if(confirm("Submit?")) finishExam(); }
        }

        function prevQ() { if(currentIndex > 0) { currentIndex--; renderQuestion(); } }

        function finishExam() {
            clearInterval(timerInterval);
            let score = 0;
            quizData.forEach((q, i) => { if(userAnswers[i] === q.correct) score++; });
            const percent = Math.round((score / quizData.length) * 100);
            document.getElementById('examPage').classList.add('hidden');
            document.getElementById('resultPage').classList.remove('hidden');
            document.getElementById('scoreCircle').innerText = percent + "%";
            document.getElementById('resultMsg').innerText = `${student.name}, you scored ${score}/${quizData.length}.`;
        }

        function downloadReport() {
            const content = `Report: ${student.name}\nScore: ${document.getElementById('scoreCircle').innerText}`;
            const blob = new Blob([content], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Report_${student.name}.txt`;
            a.click();
        }

        // --- SECRET ADMIN LOGIC ---
        document.addEventListener('keydown', e => {
            if(e.ctrlKey && e.shiftKey && e.key === 'A') {
                const pw = prompt("Admin Password:");
                if(pw === '911') { // CHANGE YOUR PASSWORD HERE
                    document.getElementById('adminPage').classList.remove('hidden');
                    document.getElementById('adminJSON').value = JSON.stringify(quizData, null, 2);
                } else {
                    alert("Access Denied");
                }
            }
        });

        function saveAdmin() {
            try {
                quizData = JSON.parse(document.getElementById('adminJSON').value);
                userAnswers = new Array(quizData.length).fill(null);
                currentIndex = 0;
                alert("Updated!");
                closeAdmin();
                renderQuestion();
            } catch(e) { alert("Invalid JSON"); }
        }

        function closeAdmin() { document.getElementById('adminPage').classList.add('hidden'); }
    </script>
</body>
</html>
