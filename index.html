<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnEase Pro - Secure Session</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <style>
        :root { --primary: #2563eb; --secondary: #64748b; --success: #10b981; --error: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none !important; }
        
        .auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9000; padding: 20px; }
        .auth-card { background: white; padding: 2.5rem; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }

        header { background: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; sticky: top; }
        .user-pill { display: flex; align-items: center; gap: 10px; background: #f1f5f9; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .db-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; padding: 20px; max-width: 1000px; margin: auto; }
        .db-card { padding: 25px 15px; border-radius: 18px; color: white; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="authLayer" class="auth-overlay">
        <div class="auth-card">
            <img src="logo.jpg" style="width:70px; border-radius:50%; margin-bottom:15px;" onerror="this.src='https://via.placeholder.com/70'">
            <h3>Scholar Login</h3>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-primary" onclick="handleAuth()">Sign In</button>
            <p style="font-size: 0.75rem; color: var(--secondary); margin-top: 15px;">Sessions expire after 45 minutes of inactivity.</p>
        </div>
    </div>

    <div id="dashboardPage" class="hidden">
        <header>
            <div class="user-pill">
                <span id="userInitial" style="background:var(--success); color:white; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.8rem;">V</span>
                <span id="userNick">User</span>
            </div>
            <div style="font-weight:bold; color:#c2410c;">🔥 Active Session</div>
            <button onclick="signOut()" style="background:none; border:none; color:red; font-weight:bold; cursor:pointer;">Logout</button>
        </header>

        <div class="db-grid">
            <div style="background:#3b82f6;" class="db-card"><h4>🏆 Exam</h4><p>Timed</p></div>
            <div style="background:#a855f7;" class="db-card"><h4>📝 Practice</h4><p>Feedback</p></div>
            <div style="background:#f97316;" class="db-card"><h4>📖 Study</h4><p>Untimed</p></div>
            <div style="background:#10b981;" class="db-card"><h4>📊 History</h4><p>Results</p></div>
        </div>
    </div>

    <script>
        // SESSION CHECK ON LOAD
        window.onload = function() {
            const session = JSON.parse(localStorage.getItem('le_session'));
            if (session) {
                const now = new Date().getTime();
                const diffInMinutes = (now - session.loginTime) / (1000 * 60); 
                
                // 45 MINUTE LIMIT
                if (diffInMinutes < 45) { 
                    showDashboard(session.nick);
                } else {
                    alert("Session expired. Please log in again.");
                    localStorage.removeItem('le_session'); 
                }
            }
        };

        function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            if (!email || pass.length < 6) return alert("Credentials required (Pass: 6+ chars)");

            const nick = email.split('@')[0]; 
            const sessionData = {
                nick: nick,
                email: email,
                loginTime: new Date().getTime()
            };

            localStorage.setItem('le_session', JSON.stringify(sessionData));
            showDashboard(nick);
        }

        function showDashboard(nickname) {
            document.getElementById('authLayer').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            document.getElementById('userNick').innerText = nickname;
            document.getElementById('userInitial').innerText = nickname.charAt(0).toUpperCase();
        }

        function signOut() {
            localStorage.removeItem('le_session');
            location.reload();
        }
    </script>
</body>
</html>
